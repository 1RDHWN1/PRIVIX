<!DOCTYPE html>
<html>
<head>
<title>Privix</title>

<style>
:root{
  --bg: #2d3442;
  --bg-soft: #313949;
  --bg-panel: #1f2530;
  --bg-card: #2a3140;
  --bg-input: #121723;
  --line: #3f4b63;
  --line-soft: #364055;
  --text: #eef2f9;
  --text-dim: #a7b3cb;
  --accent: #58b0ff;
  --accent-2: #7fd4ff;
  --danger: #ff7878;
  --success: #6ce98a;
}

*{
  box-sizing: border-box;
}

body{
  margin:0;
  font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
  background:
    radial-gradient(circle at top right, rgba(127, 212, 255, 0.08), transparent 35%),
    radial-gradient(circle at top left, rgba(88, 176, 255, 0.08), transparent 30%),
    var(--bg);
  color:var(--text);
}

.app{
  display:flex;
  height:100dvh;
  overflow:hidden;
}

.servers{
  width:86px;
  background:var(--bg-panel);
  color:var(--text);
  padding:18px 10px;
  border-right:1px solid var(--line-soft);
}

.servers h4{
  margin:0;
  font-size:14px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  text-align:center;
  color:var(--accent-2);
}

.channels{
  width:330px;
  background:#262e3c;
  color:var(--text);
  padding:14px 12px;
  border-right:1px solid var(--line-soft);
  overflow:auto;
}

.chat{
  flex:1;
  background:var(--bg-soft);
  color:var(--text);
  display:flex;
  flex-direction:column;
  min-width:0;
}

.messages{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:16px 18px;
  line-height:1.55;
}

.messages-empty{
  min-height:100%;
  display:grid;
  place-items:center;
  padding:24px 4px;
}

.messages-empty-card{
  width:min(520px, 100%);
  border:1px solid var(--line);
  background:linear-gradient(160deg, rgba(127, 212, 255, 0.08), rgba(24, 34, 52, 0.85));
  border-radius:14px;
  padding:20px 18px;
  box-shadow:0 8px 24px rgba(0, 0, 0, 0.24);
}

.messages-empty-title{
  margin:0 0 8px;
  font-size:20px;
  color:#f7fbff;
}

.messages-empty-subtitle{
  margin:0 0 14px;
  font-size:14px;
  color:var(--text-dim);
  line-height:1.45;
}

.messages-empty-btn{
  background:#77c8ff;
  border-color:#6abcf6;
}

.messages b{
  color:#f8fbff;
}

.chat-line{
  max-width:100%;
  padding:4px 6px;
  margin:2px -6px;
  border-radius:8px;
  white-space:normal;
  overflow-wrap:anywhere;
  word-break:break-word;
  opacity:1;
  transform:translateY(0);
  transition:
    opacity 220ms ease,
    transform 220ms ease,
    background-color 320ms ease;
}

.chat-line.is-self{
  border-left:2px solid rgba(119, 200, 255, 0.75);
  padding-left:8px;
}

.chat-line.is-self-pulse{
  animation:selfMessagePulse 620ms ease;
}

.chat-line small{
  color:var(--text-dim);
}

.chat-line b,
.chat-line span{
  overflow-wrap:anywhere;
  word-break:break-word;
}

.chat-line.is-new{
  opacity:0;
  transform:translateY(6px);
  background:rgba(127, 212, 255, 0.16);
}

@keyframes selfMessagePulse{
  0%{
    background:rgba(119, 200, 255, 0.22);
    box-shadow:0 0 0 0 rgba(119, 200, 255, 0.2);
  }
  100%{
    background:transparent;
    box-shadow:0 0 0 8px rgba(119, 200, 255, 0);
  }
}

.typing-indicator{
  min-height:18px;
  padding:0 14px 8px;
  font-size:12px;
  color:var(--text-dim);
  opacity:0;
  transform:translateY(3px);
  transition:opacity 160ms ease, transform 160ms ease;
}

.typing-indicator.show{
  opacity:0.92;
  transform:translateY(0);
}

.input{
  padding:10px 12px;
  background:#353d4d;
  border-top:1px solid var(--line);
  display:flex;
  gap:8px;
  align-items:center;
}

.section{
  border:1px solid var(--line-soft);
  border-radius:12px;
  padding:11px;
  margin-bottom:10px;
  background:var(--bg-card);
}

.section h4{
  margin:0 0 10px;
  font-size:13px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  color:#d5e8ff;
}

.section label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
  font-size:12px;
  color:#d7e3f8;
}

.field{
  width:100%;
  border:1px solid var(--line);
  background:var(--bg-input);
  color:var(--text);
  border-radius:9px;
  padding:9px 10px;
  outline:none;
}

.field:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px rgba(88, 176, 255, 0.22);
}

.field::placeholder{
  color:var(--text-dim);
}

#invite-code{
  text-transform:uppercase;
  letter-spacing:0.04em;
}

.row{
  margin-top:8px;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
}

.row .field{
  flex:1;
  min-width:0;
}

.row.actions button{
  flex:1;
  min-width:0;
}

.collapsible-section{
  max-height:1000px;
  opacity:1;
  overflow:hidden;
  transition:
    max-height 220ms ease,
    opacity 180ms ease,
    margin-bottom 180ms ease,
    padding-top 180ms ease,
    padding-bottom 180ms ease,
    border-width 180ms ease;
}

.collapsible-row{
  max-height:90px;
  opacity:1;
  overflow:hidden;
  transition:
    max-height 180ms ease,
    opacity 160ms ease,
    margin-top 160ms ease;
}

.collapsible-section.is-collapsed{
  max-height:0;
  opacity:0;
  margin-bottom:0;
  padding-top:0;
  padding-bottom:0;
  border-width:0;
  pointer-events:none;
}

.collapsible-row.is-collapsed{
  max-height:0;
  opacity:0;
  margin-top:0;
  pointer-events:none;
}

.hint{
  display:block;
  margin-top:7px;
  color:var(--text-dim);
  font-size:12px;
  line-height:1.4;
}

.invite-preview{
  display:block;
  margin-top:7px;
  color:var(--text-dim);
  font-size:12px;
  word-break:break-all;
}

.member-list{
  min-height:44px;
  max-height:170px;
  overflow:auto;
  font-size:13px;
  line-height:1.5;
  padding:8px;
  border:1px solid var(--line);
  border-radius:9px;
  background:#1b2230;
  transition:opacity 160ms ease, transform 160ms ease, filter 160ms ease;
}

.member-list.is-refreshing{
  opacity:0.58;
  transform:translateY(1px);
  filter:saturate(0.88);
}

.member-list .list-row{
  padding:2px 0;
}

.member-list .list-row.member-item{
  margin:1px -2px;
  padding:4px 6px;
  border-radius:7px;
  cursor:pointer;
  transition:background-color 140ms ease, border-color 140ms ease;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
  row-gap:6px;
  flex-wrap:wrap;
  border:1px solid transparent;
}

.member-list .list-row.member-item:hover{
  background:rgba(127, 212, 255, 0.14);
  border-color:rgba(127, 212, 255, 0.35);
}

.member-list .list-row.member-item:focus-visible{
  outline:1px solid var(--accent);
  outline-offset:1px;
  background:rgba(127, 212, 255, 0.18);
}

.member-main{
  flex:1 1 130px;
  min-width:0;
  display:flex;
  align-items:center;
  gap:7px;
}

.member-name{
  display:inline-block;
  max-width:100%;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:#f4f8ff;
  font-weight:600;
}

.member-role{
  padding:1px 6px;
  border-radius:999px;
  font-size:11px;
  letter-spacing:0.02em;
  text-transform:lowercase;
  color:#d7e6ff;
  background:rgba(120, 136, 166, 0.35);
  border:1px solid rgba(120, 136, 166, 0.46);
}

.member-role[data-role="admin"]{
  background:rgba(255, 119, 119, 0.2);
  border-color:rgba(255, 119, 119, 0.42);
}

.member-role[data-role="moderator"]{
  background:rgba(120, 230, 180, 0.18);
  border-color:rgba(120, 230, 180, 0.34);
}

.member-role[data-role="muted"]{
  background:rgba(255, 216, 135, 0.22);
  border-color:rgba(255, 216, 135, 0.4);
  color:#ffe9bc;
}

.member-actions{
  display:flex;
  gap:4px;
  opacity:0;
  transform:translateX(4px);
  transition:opacity 120ms ease, transform 120ms ease;
  margin-left:auto;
  flex-wrap:wrap;
  justify-content:flex-end;
  max-width:100%;
}

.member-item:hover .member-actions,
.member-item:focus-within .member-actions{
  opacity:1;
  transform:translateX(0);
}

.member-action-btn{
  font-size:11px;
  padding:3px 6px;
  border-radius:7px;
  background:#d4e6ff;
  border-color:#9db7d7;
  line-height:1.1;
}

.member-action-btn.is-danger{
  background:#ffd4d4;
  border-color:#f2a7a7;
  color:#4f1111;
}

.member-action-btn.is-warn{
  background:#ffeac5;
  border-color:#efc377;
  color:#4d3814;
}

.member-list mark{
  background:rgba(127, 212, 255, 0.36);
  color:#f7fbff;
  border-radius:4px;
  padding:0 2px;
}

.member-list .list-empty{
  color:var(--text-dim);
}

.member-tools-hint{
  display:block;
  margin-top:6px;
  color:var(--text-dim);
  font-size:12px;
}

.member-mute-config{
  align-items:stretch;
}

.member-mute-config .field{
  flex:1;
}

.member-mute-duration{
  max-width:128px;
}

.audit-tools{
  margin-bottom:8px;
}

.audit-tools .field{
  flex:1;
}

.audit-filter{
  max-width:124px;
}

.status{
  margin-top:8px;
  font-size:12px;
  color:var(--text-dim);
}

.status[data-state="ready"]{
  color:var(--success);
}

.composer-input{
  flex:1;
  min-width:0;
}

.check-row{
  align-items:center;
}

.check-row label{
  display:flex;
  align-items:center;
  gap:6px;
  margin:0;
  font-size:13px;
  font-weight:500;
  color:#dbe6fb;
}

button{
  border:1px solid #60708d;
  background:#dde5f1;
  color:#101827;
  border-radius:9px;
  padding:8px 10px;
  font-weight:600;
  cursor:pointer;
  transition:
    opacity 160ms ease,
    max-width 180ms ease,
    width 180ms ease,
    padding 180ms ease,
    margin 180ms ease,
    border-width 180ms ease,
    transform 180ms ease;
}

button:hover{
  filter:brightness(1.02);
}

button:disabled{
  opacity:0.52;
  cursor:not-allowed;
}

button.is-soft-hidden{
  opacity:0;
  width:0;
  max-width:0;
  padding-left:0;
  padding-right:0;
  margin:0;
  border-width:0;
  overflow:hidden;
  pointer-events:none;
  transform:scale(0.96);
}

#create-server-btn,
#create-channel-btn,
#join-invite-btn,
#send-btn{
  background:#77c8ff;
  border-color:#6abcf6;
}

#leave-server-btn,
#delete-channel-btn,
#kick-btn{
  background:#ffd4d4;
  border-color:#f2a7a7;
  color:#4f1111;
}

#mute-btn{
  background:#ffeac5;
  border-color:#efc377;
  color:#4d3814;
}

#unmute-btn{
  background:#dbe9ff;
  border-color:#9eb6d8;
  color:#1c2e4d;
}

.notice-backdrop{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(9, 12, 18, 0.52);
  z-index:50;
}

.notice-backdrop.show{
  display:flex;
}

.notice-card{
  width:min(420px, calc(100vw - 28px));
  background:#151a24;
  color:#edf2ff;
  border:1px solid #38445f;
  border-radius:12px;
  padding:14px 14px 12px;
  box-shadow:0 12px 34px rgba(0, 0, 0, 0.45);
}

.notice-card.success{
  border-color:#2a7f4e;
}

.notice-card.error{
  border-color:#8a3a3a;
}

.notice-title{
  font-weight:700;
  margin-bottom:6px;
}

.notice-msg{
  font-size:14px;
  line-height:1.45;
}

.notice-actions{
  margin-top:10px;
  display:flex;
  gap:8px;
  justify-content:flex-end;
}

.notice-action{
  background:#77c8ff;
  border-color:#6abcf6;
}

.notice-action.is-hidden{
  display:none;
}

@media (max-width: 1100px){
  .channels{
    width:300px;
  }
}

@media (max-width: 900px){
  .servers{
    display:none;
  }
  .channels{
    width:100%;
    max-width:340px;
  }
  .member-actions{
    opacity:1;
    transform:none;
  }
}

@media (max-width: 760px){
  .app{
    flex-direction:column;
  }
  .channels{
    width:100%;
    max-width:none;
    max-height:46dvh;
    border-right:none;
    border-bottom:1px solid var(--line-soft);
  }
}

@media (prefers-reduced-motion: reduce){
  .collapsible-section,
  .collapsible-row,
  button,
  .chat-line,
  .typing-indicator{
    transition:none;
  }
}

</style>

</head>

<body>

<div class="app">

<div class="servers">
<h4>Privix</h4>
</div>

<div class="channels">

<div id="section-servers" class="section">
<h4>Servers</h4>

<select id="server-select" class="field"></select>
<div id="row-server-manage" class="row">
  <input id="server-name" class="field" placeholder="new server name"/>
  <button id="create-server-btn" type="button">Create</button>
  <button id="rename-server-btn" type="button">Rename</button>
</div>
<small id="no-server-hint" class="hint">
  Create or Join Server: buat server baru atau masuk pakai invite code.
</small>
<div id="row-server-leave" class="row collapsible-row">
  <button id="leave-server-btn" type="button">Leave Server</button>
</div>
<div id="row-transfer-owner" class="row collapsible-row">
  <input id="owner-username" class="field" placeholder="new owner username"/>
  <button id="transfer-owner-btn" type="button">Transfer Owner</button>
</div>
<div id="row-invite-join" class="row">
  <input id="invite-code" class="field" placeholder="invite code"/>
  <button id="join-invite-btn" type="button">Join</button>
</div>
<div id="row-invite-actions" class="row actions collapsible-row">
  <button id="get-invite-btn" type="button">Get Invite</button>
  <button id="regen-invite-btn" type="button">Regen Invite</button>
  <button id="copy-invite-btn" type="button">Copy Invite</button>
</div>
<small id="invite-preview" class="invite-preview collapsible-row"></small>
</div>

<div id="section-channels" class="section collapsible-section">
<h4>Channels</h4>

<select id="channel" class="field">
</select>
<div id="row-channel-create" class="row collapsible-row">
  <input id="channel-name" class="field" placeholder="new-channel"/>
  <button id="create-channel-btn" type="button">Create</button>
</div>
<div id="row-channel-manage" class="row collapsible-row">
  <button id="rename-channel-btn" type="button">Rename</button>
  <button id="delete-channel-btn" type="button">Delete</button>
</div>
<div id="row-channel-perm-view" class="row check-row collapsible-row">
  <label>
    <input id="perm-member-view" type="checkbox"/> Member can view
  </label>
</div>
<div id="row-channel-perm-send" class="row check-row collapsible-row">
  <label>
    <input id="perm-member-send" type="checkbox"/> Member can send
  </label>
  <button id="save-perm-btn" type="button">Save Perm</button>
</div>
</div>

<div class="section">
<label>Username</label>
<input id="username" class="field" placeholder="username"/>
<div id="connection-status" class="status" data-state="pending">Connecting...</div>
</div>

<div id="section-members" class="section collapsible-section">
<h4>Members</h4>
<div class="row">
  <input id="member-filter" class="field" placeholder="search member or role"/>
</div>
<div id="member-list" class="member-list"></div>
<small class="member-tools-hint">Tip: klik nama member untuk isi target. Atur durasi/alasan mute di bawah, atau pakai quick actions di kanan.</small>
<div id="row-member-target" class="row collapsible-row">
  <input id="member-username" class="field" placeholder="username"/>
</div>
<div id="row-member-role-main" class="row actions collapsible-row">
  <button id="promote-btn" type="button">Make Admin</button>
  <button id="mod-btn" type="button">Make Mod</button>
</div>
<div id="row-member-role-demote" class="row collapsible-row">
  <button id="demote-btn" type="button">Make Member</button>
</div>
<div id="row-member-kick" class="row collapsible-row">
  <button id="kick-btn" type="button">Kick Member</button>
</div>
<div id="row-member-mute-config" class="row member-mute-config collapsible-row">
  <select id="mute-duration" class="field member-mute-duration">
    <option value="5">Mute 5m</option>
    <option value="10" selected>Mute 10m</option>
    <option value="30">Mute 30m</option>
    <option value="60">Mute 1h</option>
    <option value="180">Mute 3h</option>
    <option value="1440">Mute 24h</option>
  </select>
  <input id="mute-reason" class="field" maxlength="200" placeholder="alasan mute (opsional)"/>
</div>
<div id="row-member-mute" class="row actions collapsible-row">
  <button id="mute-btn" type="button">Apply Mute</button>
  <button id="unmute-btn" type="button">Unmute</button>
</div>
</div>

<div id="section-audit" class="section collapsible-section">
<h4>Audit</h4>
<div class="row audit-tools">
  <select id="audit-filter" class="field audit-filter">
    <option value="all" selected>all</option>
    <option value="member">member</option>
    <option value="channel">channel</option>
    <option value="server">server</option>
    <option value="invite">invite</option>
    <option value="other">other</option>
  </select>
  <input id="audit-search" class="field" placeholder="search audit"/>
</div>
<div id="audit-list" class="member-list"></div>
</div>

</div>

<div class="chat">

<div class="messages" id="messages"></div>
<div id="typing-indicator" class="typing-indicator" aria-live="polite"></div>

<div class="input">
<input id="msg" class="field composer-input" placeholder="message"/>
<button id="send-btn" type="button">Send</button>
</div>

</div>

</div>

<div id="notice-backdrop" class="notice-backdrop" aria-hidden="true">
  <div id="notice-card" class="notice-card">
    <div id="notice-title" class="notice-title">Info</div>
    <div id="notice-message" class="notice-msg"></div>
    <div class="notice-actions">
      <button id="notice-action" class="notice-action is-hidden" type="button"></button>
      <button id="notice-ok" type="button">OK</button>
    </div>
  </div>
</div>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
